find_spots:
  name: Spots suchen
  description: >-
    Findet hoch gelegene, zonenfreie Spots im Umkreis und gibt sie als
    Service-Antwort zurück. Orientierungshilfe, keine Rechtsgarantie.
  fields:
    latitude:
      name: Breitengrad
      description: Mittelpunkt der Suche, Vorgabe ist der Heimat-Standort.
      required: false
      example: 50.3
      selector:
        number:
          min: -90
          max: 90
          mode: box
    longitude:
      name: Längengrad
      description: Mittelpunkt der Suche, Vorgabe ist der Heimat-Standort.
      required: false
      example: 6.5
      selector:
        number:
          min: -180
          max: 180
          mode: box
    radius_km:
      name: Radius (km)
      description: Suchradius um den Mittelpunkt.
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          unit_of_measurement: km
          mode: slider
    count:
      name: Anzahl Spots
      description: Wie viele Spots maximal zurückgegeben werden.
      required: false
      default: 8
      selector:
        number:
          min: 1
          max: 30
          step: 1
          mode: slider
    min_elevation:
      name: Mindesthöhe (m)
      description: Nur Spots oberhalb dieser Geländehöhe berücksichtigen.
      required: false
      selector:
        number:
          min: 0
          max: 3000
          step: 10
          unit_of_measurement: m
          mode: box
    exclude_forest:
      name: Wald-Spots ausschließen
      description: >-
        Spots, die im Wald liegen, aus den Ergebnissen entfernen
        (Walddaten aus OpenStreetMap). Vorgabe aus der Integration.
      required: false
      selector:
        boolean:
    require_road_access:
      name: Nur erreichbare Spots
      description: >-
        Nur Spots nahe einer Straße/einem Feldweg behalten (OpenStreetMap).
      required: false
      selector:
        boolean:
    max_road_distance_m:
      name: Max. Abstand zur Straße/Weg (m)
      description: Höchstabstand zur nächsten Straße/zum Weg für „erreichbar".
      required: false
      selector:
        number:
          min: 10
          max: 5000
          step: 10
          unit_of_measurement: m
          mode: box
    poi_bonus:
      name: Bonus für Sehenswertes
      description: >-
        Spots nahe Aussichtspunkt/historischem Ort/Gipfel/Turm bevorzugen
        (OpenStreetMap).
      required: false
      selector:
        boolean:
    poi_bonus_radius_m:
      name: Bonus-Radius (m)
      description: Bis zu diesem Abstand gilt ein Spot als „nahe Sehenswertem".
      required: false
      selector:
        number:
          min: 50
          max: 10000
          step: 50
          unit_of_measurement: m
          mode: box

get_pois:
  name: Sehenswertes laden
  description: >-
    Liefert Sehenswertes-POIs (Aussichtspunkte, historische Orte, Gipfel,
    Aussichtstürme) im Umkreis als Service-Antwort.
  fields:
    latitude:
      name: Breitengrad
      description: Mittelpunkt.
      required: true
      example: 48.9
      selector:
        number:
          min: -90
          max: 90
          mode: box
    longitude:
      name: Längengrad
      description: Mittelpunkt.
      required: true
      example: 12.7
      selector:
        number:
          min: -180
          max: 180
          mode: box
    radius_km:
      name: Radius (km)
      description: Umkreis um den Mittelpunkt.
      required: false
      default: 10
      selector:
        number:
          min: 0.5
          max: 50
          step: 0.5
          unit_of_measurement: km
          mode: slider
