find_spots:
  name: Spots suchen
  description: >-
    Findet hoch gelegene, zonenfreie Spots im Umkreis und gibt sie als
    Service-Antwort zurück. Orientierungshilfe, keine Rechtsgarantie.
  fields:
    latitude:
      name: Breitengrad
      description: Mittelpunkt der Suche (Vorgabe: Heimat-Standort).
      required: false
      example: 50.3
      selector:
        number:
          min: -90
          max: 90
          step: 0.0001
          mode: box
    longitude:
      name: Längengrad
      description: Mittelpunkt der Suche (Vorgabe: Heimat-Standort).
      required: false
      example: 6.5
      selector:
        number:
          min: -180
          max: 180
          step: 0.0001
          mode: box
    radius_km:
      name: Radius (km)
      description: Suchradius um den Mittelpunkt.
      required: false
      default: 10
      selector:
        number:
          min: 1
          max: 50
          step: 1
          unit_of_measurement: km
          mode: slider
    count:
      name: Anzahl Spots
      description: Wie viele Spots maximal zurückgegeben werden.
      required: false
      default: 8
      selector:
        number:
          min: 1
          max: 30
          step: 1
          mode: slider
    min_elevation:
      name: Mindesthöhe (m)
      description: Nur Spots oberhalb dieser Geländehöhe berücksichtigen.
      required: false
      selector:
        number:
          min: 0
          max: 3000
          step: 10
          unit_of_measurement: m
          mode: box
